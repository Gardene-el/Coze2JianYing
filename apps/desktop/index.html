<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coze2JianYing</title>
    <link rel="icon" href="/assets/electron/resources/icon.png" />
    <style>
      html body {
        background: #f8f8f8;
      }
      html[data-theme='dark'] body {
        background-color: #000;
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: inherit;
        gap: 12px;
      }
      @keyframes loading-draw {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes loading-fill {
        30% { fill-opacity: 0.05; }
        100% { fill-opacity: 1; }
      }
      #loading-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #1f1f1f;
        font-size: 18px;
        font-family: system-ui, sans-serif;
        letter-spacing: 0.05em;
      }
      html[data-theme='dark'] #loading-brand {
        color: #f0f0f0;
      }
    </style>
  </head>
  <body style="height: 100%">
    <script>
      (function () {
        var theme = 'system';
        try {
          theme = localStorage.getItem('theme') || 'system';
        } catch (_) {}
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        var resolvedTheme = theme === 'system' ? systemTheme : theme;
        if (resolvedTheme === 'dark' || resolvedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', resolvedTheme);
        }
        var locale = navigator.language || 'en-US';
        document.documentElement.lang = locale;
        var rtl = ['ar', 'arc', 'dv', 'fa', 'ha', 'he', 'khw', 'ks', 'ku', 'ps', 'ur', 'yi'];
        document.documentElement.dir =
          rtl.indexOf(locale.split('-')[0].toLowerCase()) >= 0 ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="loading-screen">
      <div id="loading-brand" aria-label="Loading" role="status">
        Loading...
      </div>
    </div>
    <div id="root" style="height: 100%;"></div>
    <script>
      window.__SERVER_CONFIG__ = undefined;
    </script>
    <script type="module" src="../../src/frontend/spa/entry.desktop.tsx"></script>
  </body>
</html>
