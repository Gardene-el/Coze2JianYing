name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up UTF-8 encoding
        run: |
          # 设置控制台代码页为 UTF-8
          chcp 65001

          # 设置环境变量（持久化到后续步骤）
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "PYTHONUTF8=1" >> $env:GITHUB_ENV

          # 设置 Git 使用 UTF-8
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8
          git config --global i18n.logoutputencoding utf-8
          git config --global core.pager "cat"

          # 验证设置
          Write-Host "当前代码页: $(chcp)"
          Write-Host "PYTHONIOENCODING: $env:PYTHONIOENCODING"
          Write-Host "PYTHONUTF8: $env:PYTHONUTF8"
          Write-Host "Git encoding config:"
          git config --get i18n.commitencoding
          git config --get i18n.logoutputencoding

      - name: Install dependencies
        run: |
          chcp 65001
          python -m pip install --upgrade pip
          pip install ".[build,gui,release]"

      - name: Configure Git
        run: |
          chcp 65001
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 确保 UTF-8 编码
          git config core.quotepath false
          git config i18n.commitencoding utf-8
          git config i18n.logoutputencoding utf-8

      - name: Debug Git Log Encoding
        run: |
          chcp 65001
          Write-Host "=== 测试 Git Log 编码 ==="
          git log --oneline -5
          Write-Host "=== Python 编码测试 ==="
          python -c "import sys; print(f'stdout encoding: {sys.stdout.encoding}'); print(f'default encoding: {sys.getdefaultencoding()}')"

      - name: Check for version bump
        id: check_version
        run: |
          chcp 65001

          # 检查是否需要发布新版本
          Write-Host "=== 运行 semantic-release version --print ==="
          $output = ""
          $exitCode = 0

          try {
            $output = semantic-release version --print --no-commit --no-tag --no-push 2>&1
            $exitCode = $LASTEXITCODE
          } catch {
            $output = $_.Exception.Message
            $exitCode = 1
          }

          Write-Host "Exit code: $exitCode"
          Write-Host "Output:"
          Write-Host $output

          if ($output -match "No release will be made") {
            Write-Host "::notice::没有需要发布的更新（无符合条件的 commit）"
            echo "should_release=false" >> $env:GITHUB_OUTPUT
          } elseif ($exitCode -eq 0) {
            Write-Host "::notice::检测到需要发布的更新"
            echo "should_release=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "::error::semantic-release 执行失败"
            exit 1
          }

      - name: Generate Coze handlers
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          chcp 65001
          python scripts/handler_generator/main.py --clean

      - name: Semantic Release (version + build + publish)
        if: steps.check_version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chcp 65001

          Write-Host "=== 执行 semantic-release version ==="
          Write-Host "此步骤会自动："
          Write-Host "  1. 更新版本号"
          Write-Host "  2. 执行 build_command (python build.py)"
          Write-Host "  3. 创建 commit 和 tag"
          semantic-release version

          Write-Host ""
          Write-Host "=== 打包 coze_plugin 内容 ==="
          # 创建 coze_plugin.zip 包含所有工具
          if (Test-Path coze_plugin) {
            # 确保 dist 目录存在
            if (-not (Test-Path dist)) {
              New-Item -ItemType Directory -Path dist
            }
            
            # 使用 PowerShell 压缩
            Compress-Archive -Path coze_plugin\* -DestinationPath dist\coze_plugin.zip -Force
            
            # 验证文件
            if (Test-Path dist/coze_plugin.zip) {
              $zipSize = (Get-Item dist/coze_plugin.zip).Length / 1KB
              Write-Host "✅ coze_plugin.zip 已创建: $([math]::Round($zipSize, 2)) KB"
            } else {
              Write-Host "⚠️ 警告: coze_plugin.zip 创建失败"
            }
          } else {
            Write-Host "⚠️ 警告: 找不到 coze_plugin 目录"
          }

          Write-Host ""
          Write-Host "=== 执行 semantic-release publish ==="
          Write-Host "此步骤会自动："
          Write-Host "  1. 创建 GitHub Release"
          Write-Host "  2. 上传 dist/*.exe 和 dist/*.zip 到 Release"
          semantic-release publish

      - name: Get new version and summary
        if: steps.check_version.outputs.should_release == 'true'
        id: version
        run: |
          chcp 65001

          # 从 Git tags 获取最新版本
          $latestTag = git describe --tags --abbrev=0
          Write-Host "🎉 发布完成！"
          Write-Host "新版本: $latestTag"
          Write-Host "查看 Release: https://github.com/${{ github.repository }}/releases/tag/$latestTag"

          # 验证 exe 文件是否存在
          if (Test-Path dist/CozeJianYingDraftGenerator.exe) {
            $fileSize = (Get-Item dist/CozeJianYingDraftGenerator.exe).Length / 1MB
            Write-Host "✅ 可执行文件已生成: $([math]::Round($fileSize, 2)) MB"
          } else {
            Write-Host "⚠️ 警告: 找不到可执行文件"
          }

          # 验证 coze_plugin.zip 是否存在
          if (Test-Path dist/coze_plugin.zip) {
            $zipSize = (Get-Item dist/coze_plugin.zip).Length / 1KB
            Write-Host "✅ coze_plugin.zip 已生成: $([math]::Round($zipSize, 2)) KB"
          } else {
            Write-Host "⚠️ 警告: 找不到 coze_plugin.zip"
          }

          echo "version=$latestTag" >> $env:GITHUB_OUTPUT
