openapi: 3.0.1
info:
  title: 开源剪映小助手Coze2Jianying
  version: v1
  description: 用于制作视频的剪映小助手，源码在https://github.com/Gardene-el/Coze2JianYing中。完整提供pyjianyingdraft原样功能，实际生成视频需配合剪映小助手的开源软件和剪映两个软件使用。
paths:
  /drafts/create_draft:
    post:
      tags:
      - basic
      summary: 创建草稿
      description: 创建一个新的剪映草稿，返回草稿 ID，后续所有操作均通过此 ID 引用该草稿。
      operationId: create_draft
      requestBody:
        content:
          application/json:
            schema:
              properties:
                width:
                  type: integer
                  minimum: 0.0
                  exclusiveMinimum: true
                  description: 视频宽度（像素）
                  default: 1920
                height:
                  type: integer
                  minimum: 0.0
                  exclusiveMinimum: true
                  description: 视频高度（像素）
                  default: 1080
                fps:
                  type: integer
                  minimum: 0.0
                  exclusiveMinimum: true
                  description: 视频帧率
                  default: 30
                draft_name:
                  type: string
                  nullable: true
                  description: 草稿名称（剪映中显示的名称），默认使用自动生成的唯一 ID
              type: object
              description: 创建草稿请求
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties:
                  draft_id:
                    type: string
                    description: 草稿 UUID
                type: object
                required:
                - draft_id
                description: 创建草稿响应
  /drafts/{draft_id}/save_draft:
    post:
      tags:
      - basic
      summary: 保存草稿
      description: 将当前草稿内容持久化写入磁盘，使剪映可以读取到最新编辑结果。
      operationId: save_draft
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
        description: 草稿的唯一标识 ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 保存草稿响应
  /drafts/{draft_id}/add_segment:
    post:
      tags:
      - basic
      summary: 添加片段到草稿
      description: 将已创建的片段（音频/视频/文本/贴纸）添加到指定草稿的对应轨道中。
      operationId: add_segment
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                segment_id:
                  type: string
                  description: Segment UUID
                track_name:
                  type: string
                  nullable: true
                  description: 目标轨道名称（通过 add_track 创建时指定的名称），同类型轨道只有一条时可省略
              type: object
              required:
              - segment_id
              description: 添加片段到草稿请求
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加片段到草稿响应
  /drafts/{draft_id}/add_track:
    post:
      tags:
      - basic
      summary: 添加轨道
      description: 在草稿中新建一条指定类型的轨道（audio/video/text/sticker/effect/filter）。
      operationId: add_track
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                track_type:
                  type: string
                  description: '轨道类型: audio/video/text/sticker/effect/filter'
                track_name:
                  type: string
                  nullable: true
                  description: 轨道名称
              type: object
              required:
              - track_type
              description: 添加轨道请求
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加轨道响应
  /drafts/{draft_id}/add_effect:
    post:
      tags:
      - basic
      summary: 添加全局特效
      description: 在草稿上添加一个覆盖指定时间范围的全局特效。
      operationId: add_effect
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                effect_type:
                  type: string
                  description: 特效类型
                target_timerange:
                  $ref: '#/components/schemas/TimeRange'
                  description: 时间范围
                params:
                  items:
                    type: number
                    nullable: true
                  type: array
                  nullable: true
                  description: 特效参数列表
              type: object
              required:
              - effect_type
              - target_timerange
              description: 添加全局特效请求
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加全局特效响应
  /drafts/{draft_id}/add_filter:
    post:
      tags:
      - basic
      summary: 添加全局滤镜
      description: 在草稿上添加一个覆盖指定时间范围的全局色彩滤镜。
      operationId: add_filter
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                filter_type:
                  type: string
                  description: 滤镜类型
                target_timerange:
                  $ref: '#/components/schemas/TimeRange'
                  description: 时间范围
                intensity:
                  type: number
                  maximum: 100.0
                  minimum: 0.0
                  description: 滤镜强度 0-100
                  default: 100.0
              type: object
              required:
              - filter_type
              - target_timerange
              description: 添加全局滤镜请求
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加全局滤镜响应
  /segments/create_audio_segment:
    post:
      tags:
      - basic
      summary: 创建音频片段
      description: 根据素材 URL 和时间范围创建音频片段，返回片段 ID，后续可将其添加到草稿轨道。
      operationId: create_audio_segment
      requestBody:
        content:
          application/json:
            schema:
              properties:
                material_url:
                  type: string
                  description: 音频素材 URL
                  default: https://gardene-el.github.io/Coze2JianYing/assets/audio.mp3
                target_timerange:
                  $ref: '#/components/schemas/TimeRange'
                  description: 在轨道上的时间范围
                source_timerange:
                  properties:
                    start:
                      type: integer
                      minimum: 0.0
                      description: 开始时间（微秒）
                    duration:
                      type: integer
                      minimum: 0.0
                      exclusiveMinimum: true
                      description: 持续时长（微秒）
                  type: object
                  description: 素材裁剪范围
                  nullable: true
                speed:
                  type: number
                  minimum: 0.0
                  exclusiveMinimum: true
                  description: 播放速度
                  default: 1.0
                volume:
                  type: number
                  maximum: 2.0
                  minimum: 0.0
                  description: 音量 0-2
                  default: 1.0
                change_pitch:
                  type: boolean
                  description: 是否跟随变速改变音调
                  default: false
              type: object
              required:
              - target_timerange
              description: 创建音频片段请求
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties:
                  segment_id:
                    type: string
                    description: Segment UUID
                type: object
                required:
                - segment_id
                description: 创建片段响应
  /segments/create_video_segment:
    post:
      tags:
      - basic
      summary: 创建视频片段
      description: 根据素材 URL 和时间范围创建视频片段，返回片段 ID，后续可将其添加到草稿轨道。
      operationId: create_video_segment
      requestBody:
        content:
          application/json:
            schema:
              properties:
                material_url:
                  type: string
                  description: 视频素材 URL
                  default: https://gardene-el.github.io/Coze2JianYing/assets/video.mp4
                target_timerange:
                  $ref: '#/components/schemas/TimeRange'
                  description: 在轨道上的时间范围
                source_timerange:
                  properties:
                    start:
                      type: integer
                      minimum: 0.0
                      description: 开始时间（微秒）
                    duration:
                      type: integer
                      minimum: 0.0
                      exclusiveMinimum: true
                      description: 持续时长（微秒）
                  type: object
                  description: 素材裁剪范围
                  nullable: true
                speed:
                  type: number
                  minimum: 0.0
                  exclusiveMinimum: true
                  description: 播放速度
                  default: 1.0
                volume:
                  type: number
                  maximum: 2.0
                  minimum: 0.0
                  description: 音量 0-2
                  default: 1.0
                change_pitch:
                  type: boolean
                  description: 是否跟随变速改变音调
                  default: false
                clip_settings:
                  $ref: '#/components/schemas/ClipSettings'
                  nullable: true
                  description: 图像调节设置
                crop_settings:
                  $ref: '#/components/schemas/CropSettings'
                  nullable: true
                  description: 裁剪设置
              type: object
              required:
              - target_timerange
              description: 创建视频片段请求
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties:
                  segment_id:
                    type: string
                    description: Segment UUID
                type: object
                required:
                - segment_id
                description: 创建片段响应
  /segments/create_text_segment:
    post:
      tags:
      - basic
      summary: 创建文本片段
      description: 根据文本内容和时间范围创建文本片段，支持字体、样式、描边、阴影等设置，返回片段 ID。
      operationId: create_text_segment
      requestBody:
        content:
          application/json:
            schema:
              properties:
                text_content:
                  type: string
                  minLength: 1
                  description: 文本内容
                  default: 据说pyJianYingDraft效果还不错?
                target_timerange:
                  $ref: '#/components/schemas/TimeRange'
                  description: 在轨道上的时间范围
                font_family:
                  type: string
                  nullable: true
                  description: 字体名称
                  default: 文轩体
                text_style:
                  $ref: '#/components/schemas/TextStyle'
                  nullable: true
                  description: 文本样式（字体大小、颜色、加粗等）
                text_border:
                  $ref: '#/components/schemas/TextBorder'
                  nullable: true
                  description: 文本描边，None 表示无描边
                text_shadow:
                  $ref: '#/components/schemas/TextShadow'
                  nullable: true
                  description: 文本阴影，None 表示无阴影
                text_background:
                  properties:
                    color:
                      type: string
                      description: 背景颜色，格式为 '#RRGGBB'
                    style:
                      type: integer
                      maximum: 2.0
                      minimum: 1.0
                      description: 背景样式 1 或 2
                      default: 1
                    alpha:
                      type: number
                      maximum: 1.0
                      minimum: 0.0
                      description: 背景不透明度 0.0-1.0
                      default: 1.0
                    round_radius:
                      type: number
                      maximum: 1.0
                      minimum: 0.0
                      description: 圆角半径 0-1
                      default: 0.0
                    height:
                      type: number
                      maximum: 1.0
                      minimum: 0.0
                      description: 背景高度 0-1
                      default: 0.14
                    width:
                      type: number
                      maximum: 1.0
                      minimum: 0.0
                      description: 背景宽度 0-1
                      default: 0.14
                    horizontal_offset:
                      type: number
                      maximum: 1.0
                      minimum: 0.0
                      description: 水平偏移 0-1
                      default: 0.5
                    vertical_offset:
                      type: number
                      maximum: 1.0
                      minimum: 0.0
                      description: 竖直偏移 0-1
                      default: 0.5
                  type: object
                  description: 文本背景，None 表示无背景
                  nullable: true
                clip_settings:
                  $ref: '#/components/schemas/ClipSettings'
                  nullable: true
                  description: 图像调节设置（位置、缩放、旋转、透明度）
              type: object
              required:
              - target_timerange
              description: 创建文本片段请求
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties:
                  segment_id:
                    type: string
                    description: Segment UUID
                type: object
                required:
                - segment_id
                description: 创建片段响应
  /segments/create_sticker_segment:
    post:
      tags:
      - basic
      summary: 创建贴纸片段
      description: 根据贴纸资源 ID 和时间范围创建贴纸片段，返回片段 ID，后续可将其添加到草稿轨道。贴纸 ID 可从教程文档→贴纸查询页面获取。
      operationId: create_sticker_segment
      requestBody:
        content:
          application/json:
            schema:
              properties:
                sticker_id:
                  type: string
                  description: 贴纸资源 ID（纯数字字符串，可从贴纸查询页面获取）
                target_timerange:
                  $ref: '#/components/schemas/TimeRange'
                  description: 在轨道上的时间范围
                clip_settings:
                  $ref: '#/components/schemas/ClipSettings'
                  nullable: true
                  description: 图像调节设置（位置、缩放、旋转、透明度）
              type: object
              required:
              - sticker_id
              - target_timerange
              description: 创建贴纸片段请求
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties:
                  segment_id:
                    type: string
                    description: Segment UUID
                type: object
                required:
                - segment_id
                description: 创建片段响应
  /segments/{segment_id}/add_audio_effect:
    post:
      tags:
      - basic
      summary: 为音频片段添加音效
      description: 为指定音频片段添加音场、变调或语音转歌曲等音效。
      operationId: add_audio_effect
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                effect_type:
                  type: string
                  description: '音效类型: AudioSceneEffectType | ToneEffectType | SpeechToSongType，格式为枚举成员名称（如
                    ''8bit''），或带类前缀（如 ''AudioSceneEffectType._8bit''）。成员名称与剪映中显示的名称一致'
                params:
                  items:
                    type: number
                    nullable: true
                  type: array
                  nullable: true
                  description: 特效参数列表（范围 0-100），参数顺序以对应枚举类成员的 annotation 为准，未提供或为
                    None 的项使用默认值
              type: object
              required:
              - effect_type
              description: 添加音频特效请求（用于 AudioSegment）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加音频特效响应
  /segments/{segment_id}/add_audio_fade:
    post:
      tags:
      - basic
      summary: 为音频片段添加淡入淡出
      description: 为指定音频片段设置淡入和淡出的时长。
      operationId: add_audio_fade
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                in_duration:
                  type: string
                  description: 淡入时长（字符串如 '1s' 或微秒整数）
                out_duration:
                  type: string
                  description: 淡出时长（字符串如 '2s' 或微秒整数）
              type: object
              required:
              - in_duration
              - out_duration
              description: 添加音频淡入淡出请求（用于 AudioSegment）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加音频淡入淡出响应
  /segments/{segment_id}/add_audio_keyframe:
    post:
      tags:
      - basic
      summary: 为音频片段添加音量关键帧
      description: 在指定时间点为音频片段添加音量关键帧，实现音量随时间的动态变化。
      operationId: add_audio_keyframe
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                time_offset:
                  type: integer
                  minimum: 0.0
                  description: 时间偏移量，单位：微秒（1秒 = 1,000,000微秒）
                volume:
                  type: number
                  description: 音量值 0-2
              type: object
              required:
              - time_offset
              - volume
              description: 添加音频关键帧请求（用于 AudioSegment）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加音频关键帧响应
  /segments/{segment_id}/add_sticker_keyframe:
    post:
      tags:
      - basic
      summary: 为贴纸片段添加关键帧
      description: 在指定时间点为贴纸片段添加位置、缩放、旋转或透明度等属性的动画关键帧。
      operationId: add_sticker_keyframe
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                time_offset:
                  type: integer
                  minimum: 0.0
                  description: 时间偏移量，单位：微秒（1秒 = 1,000,000微秒）
                value:
                  type: number
                  description: 关键帧值
                property:
                  type: string
                  description: KeyframeProperty 枚举成员，格式：KeyframeProperty.<name>，可选属性：KeyframeProperty.position_x
                    / KeyframeProperty.position_y / KeyframeProperty.rotation / KeyframeProperty.scale_x
                    / KeyframeProperty.scale_y / KeyframeProperty.uniform_scale
              type: object
              required:
              - time_offset
              - value
              - property
              description: 添加贴纸关键帧请求（用于 StickerSegment）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加贴纸关键帧响应
  /segments/{segment_id}/add_text_animation:
    post:
      tags:
      - basic
      summary: 为文本片段添加动画
      description: 为指定文本片段添加入场、出场或循环动画。
      operationId: add_text_animation
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                animation_type:
                  type: string
                  description: '动画类型: TextIntro | TextOutro | TextLoopAnim，格式为枚举成员名称（如
                    ''打字机''），或带类前缀（如 ''TextIntro.打字机''）。注意：若需同时使用入场/出场动画（TextIntro/TextOutro）与循环动画（TextLoopAnim），必须先添加入场/出场动画，再添加循环动画；顺序颠倒会导致循环动画时间范围计算错误'
                duration:
                  type: string
                  nullable: true
                  description: 动画时长，省略则使用动画内置时长（字符串如 '1s' 或微秒整数），循环动画忽略此参数
              type: object
              required:
              - animation_type
              description: 添加文本动画请求（用于 TextSegment）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                properties: {}
                type: object
                description: 添加文本动画响应
  /segments/{segment_id}/add_text_bubble:
    post:
      tags:
      - basic
      summary: 为文本片段添加气泡
      description: 为指定文本片段添加气泡背景装饰特效。
      operationId: add_text_bubble
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                effect_id:
                  type: string
