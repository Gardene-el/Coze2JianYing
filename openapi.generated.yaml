            schema:
              $ref: '#/components/schemas/AddFilterRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddFilterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /segments/create_audio_segment:
    post:
      tags:
      - basic
      summary: 创建音频片段
      description: 根据素材 URL 和时间范围创建音频片段，返回片段 ID，后续可将其添加到草稿轨道。
      operationId: create_audio_segment_segments_create_audio_segment_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAudioSegmentRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAudioSegmentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /segments/create_video_segment:
    post:
      tags:
      - basic
      summary: 创建视频片段
      description: 根据素材 URL 和时间范围创建视频片段，返回片段 ID，后续可将其添加到草稿轨道。
      operationId: create_video_segment_segments_create_video_segment_post
