openapi: 3.1.0
info:
  title: Coze2JianYing API
  description: 剪映草稿操作 API + Electron 前端管理端点
  version: 1.0.0
paths:
  /gui/health:
    get:
      tags:
      - GUI 管理
      summary: Health
      operationId: health_gui_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Gui Health Get
  /gui/settings:
    get:
      tags:
      - GUI 管理
      summary: Get Settings
      operationId: get_settings_gui_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Settings Gui Settings Get
    put:
      tags:
      - GUI 管理
      summary: Update Settings
      operationId: update_settings_gui_settings_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsPayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: boolean
                type: object
                title: Response Update Settings Gui Settings Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gui/settings/detect-path:
    post:
      tags:
      - GUI 管理
      summary: Detect Path
      operationId: detect_path_gui_settings_detect_path_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Detect Path Gui Settings Detect Path Post
  /gui/draft/generate:
    post:
      tags:
      - GUI 管理
      summary: Generate Draft
      operationId: generate_draft_gui_draft_generate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateDraftPayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Generate Draft Gui Draft Generate Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gui/script/format:
    post:
      tags:
      - GUI 管理
      summary: Format Script
      operationId: format_script_gui_script_format_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScriptPayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Format Script Gui Script Format Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gui/script/validate:
    post:
      tags:
      - GUI 管理
      summary: Validate Script
      operationId: validate_script_gui_script_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScriptPayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Validate Script Gui Script Validate Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gui/script/execute:
    post:
      tags:
      - GUI 管理
      summary: Execute Script
      operationId: execute_script_gui_script_execute_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutePayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: boolean
                type: object
                title: Response Execute Script Gui Script Execute Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gui/replay/execute:
    post:
      tags:
      - GUI 管理
      summary: Execute Replay
      description: "从 Capture Worker 拉取并执行录制的调用序列。\n\n与粘贴脚本、粘贴草稿相同的一次性执行模式：\n  - 调用方负责在执行前启动\
        \ Python 后端（通过 useEnsureBackend）\n  - 执行完成后调用方卸载组件自动回收后端\n\n安全约束：仅允许本地请求调用。"
      operationId: execute_replay_gui_replay_execute_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplayExecutePayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Execute Replay Gui Replay Execute Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gui/replay/{draft_id}:
    get:
      tags:
      - GUI 管理
      summary: Replay Draft
      operationId: replay_draft_gui_replay__draft_id__get
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          title: Draft Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Replay Draft Gui Replay  Draft Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gui/logs/stream:
    get:
      tags:
      - GUI 管理
      summary: Logs Stream
      operationId: logs_stream_gui_logs_stream_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /drafts/{draft_id}/add_audios:
    post:
      tags:
      - easy
      summary: 批量添加音频
      description: 解析音频信息 JSON，批量创建音频片段并添加到草稿，返回片段 ID 列表。
      operationId: add_audios_drafts__draft_id__add_audios_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAudiosRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddAudiosResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_captions:
    post:
      tags:
      - easy
      summary: 批量添加字幕
      description: 解析字幕信息 JSON，批量创建文本片段并添加到草稿，支持字体、颜色、阴影等样式设置。
      operationId: add_captions_drafts__draft_id__add_captions_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCaptionsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddCaptionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_videos:
    post:
      tags:
      - easy
      summary: 批量添加视频
      description: 解析视频信息 JSON，批量创建视频片段并添加到草稿，返回片段 ID 列表。
      operationId: add_videos_drafts__draft_id__add_videos_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddVideosRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddVideosResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_images:
    post:
      tags:
      - easy
      summary: 批量添加图片
      description: 解析图片信息 JSON，批量创建图片片段并添加到草稿，返回片段 ID 列表。
      operationId: add_images_drafts__draft_id__add_images_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
