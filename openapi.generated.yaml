              schema:
                $ref: '#/components/schemas/AddSegmentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_track:
    post:
      tags:
      - basic
      summary: 添加轨道
      description: 在草稿中新建一条指定类型的轨道（audio/video/text/sticker/effect/filter）。
      operationId: add_track_drafts__draft_id__add_track_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTrackRequest'
      responses:
        '200':
          description: Successful Response
