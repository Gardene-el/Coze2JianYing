            schema:
              properties:
                time_offset:
                  type: integer
                  minimum: 0.0
                  description: 时间偏移量，单位：微秒（1秒 = 1,000,000微秒）
                value:
                  type: number
                  description: 关键帧值，具体范围依属性而定，见 property 说明
