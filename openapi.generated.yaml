components:
  schemas:
    AddAudioEffectRequest:
      properties:
        effect_type:
          type: string
          title: Effect Type
          description: '音效类型: AudioSceneEffectType | ToneEffectType | SpeechToSongType'
        params:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Params
          description: 特效参数列表（范围 0-100）
      type: object
      required:
      - effect_type
      title: AddAudioEffectRequest
      description: 添加音频特效请求（用于 AudioSegment）
      example:
        effect_type: AudioSceneEffectType.VOICE_CHANGER
        params:
        - 50.0
        - 75.0
    AddAudioEffectResponse:
      properties: {}
      type: object
      title: AddAudioEffectResponse
      description: 添加音频特效响应
    AddAudioFadeRequest:
      properties:
        in_duration:
          type: string
          title: In Duration
          description: 淡入时长（字符串如 '1s' 或微秒数）
        out_duration:
          type: string
          title: Out Duration
          description: 淡出时长
      type: object
      required:
      - in_duration
      - out_duration
      title: AddAudioFadeRequest
      description: 添加音频淡入淡出请求（用于 AudioSegment）
      example:
        in_duration: 1s
        out_duration: 0s
    AddAudioFadeResponse:
      properties: {}
      type: object
      title: AddAudioFadeResponse
      description: 添加音频淡入淡出响应
    AddAudioKeyframeRequest:
      properties:
        time_offset:
          type: integer
          minimum: 0.0
          title: Time Offset
          description: 时间偏移量，单位：微秒（1秒 = 1,000,000微秒）
        volume:
          type: number
          title: Volume
          description: 音量值 0-2
      type: object
      required:
      - time_offset
      - volume
      title: AddAudioKeyframeRequest
      description: 添加音频关键帧请求（用于 AudioSegment）
      example:
        time_offset: 2000000
        volume: 0.8
    AddAudioKeyframeResponse:
      properties: {}
      type: object
      title: AddAudioKeyframeResponse
      description: 添加音频关键帧响应
    AddAudiosRequest:
      properties:
        audio_infos:
          type: string
          title: Audio Infos
          description: 音频信息列表，JSON字符串
      type: object
      required:
      - audio_infos
      title: AddAudiosRequest
      description: 批量添加音频请求参数。
    AddAudiosResponse:
      properties:
        segment_ids:
          items:
            type: string
          type: array
          title: Segment Ids
          description: 音频片段ID列表
      type: object
      title: AddAudiosResponse
      description: 批量添加音频响应参数。
    AddCaptionsRequest:
      properties:
        captions:
          type: string
          title: Captions
          description: 字幕信息列表，JSON字符串
        text_color:
          type: string
          title: Text Color
          description: 文本颜色（十六进制）
          default: '#ffffff'
        border_color:
          anyOf:
          - type: string
          - type: 'null'
          title: Border Color
          description: 边框颜色（十六进制）
        alignment:
          type: integer
          maximum: 5.0
          minimum: 0.0
          title: Alignment
          description: 文本对齐方式
          default: 1
        alpha:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Alpha
          description: 文本透明度
          default: 1.0
        font:
          anyOf:
          - type: string
          - type: 'null'
          title: Font
          description: 字体名称
        font_size:
          type: integer
          minimum: 1.0
          title: Font Size
          description: 字体大小
          default: 15
        letter_spacing:
          anyOf:
          - type: number
          - type: 'null'
          title: Letter Spacing
          description: 字间距
        line_spacing:
          anyOf:
          - type: number
          - type: 'null'
          title: Line Spacing
          description: 行间距
        scale_x:
          type: number
          title: Scale X
          description: 水平缩放
          default: 1.0
        scale_y:
          type: number
          title: Scale Y
          description: 垂直缩放
          default: 1.0
        transform_x:
          type: number
          title: Transform X
          description: 水平位移
          default: 0.0
        transform_y:
          type: number
          title: Transform Y
          description: 垂直位移
          default: 0.0
        style_text:
          type: boolean
          title: Style Text
          description: 是否使用样式文本
          default: false
        underline:
          type: boolean
          title: Underline
          description: 文字下划线开关
          default: false
        italic:
          type: boolean
          title: Italic
          description: 文本斜体开关
          default: false
        bold:
          type: boolean
          title: Bold
          description: 文本加粗开关
          default: false
        has_shadow:
          type: boolean
          title: Has Shadow
          description: 是否启用文本阴影
          default: false
        shadow_info:
          anyOf:
          - $ref: '#/components/schemas/ShadowInfo'
          - type: 'null'
          description: 文本阴影参数
      type: object
      required:
      - captions
      title: AddCaptionsRequest
      description: 批量添加字幕请求参数。
    AddCaptionsResponse:
      properties:
        segment_ids:
          items:
            type: string
          type: array
          title: Segment Ids
          description: 字幕片段ID列表
      type: object
      title: AddCaptionsResponse
      description: 批量添加字幕响应参数。
    AddEffectRequest:
      properties:
        effect_type:
          type: string
          title: Effect Type
          description: 特效类型
        target_timerange:
          $ref: '#/components/schemas/TimeRange'
          description: 时间范围
        params:
          anyOf:
          - items:
              anyOf:
              - type: number
              - type: 'null'
            type: array
          - type: 'null'
          title: Params
          description: 特效参数列表
      type: object
      required:
      - effect_type
      - target_timerange
      title: AddEffectRequest
      description: 添加全局特效请求
      example:
        effect_type: VideoSceneEffectType.XXX
        params:
        - 0.5
        - 1.0
        target_timerange:
          duration: 5000000
          start: 0
    AddEffectResponse:
      properties: {}
      type: object
      title: AddEffectResponse
      description: 添加全局特效响应
    AddEffectsRequest:
      properties:
        effect_infos:
          type: string
          title: Effect Infos
          description: 特效信息列表，JSON字符串
      type: object
      required:
      - effect_infos
      title: AddEffectsRequest
      description: 添加特效请求参数。
    AddEffectsResponse:
      properties:
        segment_ids:
          items:
            type: string
          type: array
          title: Segment Ids
          description: 特效片段ID列表
      type: object
      title: AddEffectsResponse
      description: 添加特效响应参数。
    AddFilterRequest:
      properties:
        filter_type:
          type: string
          title: Filter Type
          description: 滤镜类型
        target_timerange:
          $ref: '#/components/schemas/TimeRange'
          description: 时间范围
        intensity:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Intensity
          description: 滤镜强度 0-100
          default: 100.0
      type: object
      required:
      - filter_type
      - target_timerange
      title: AddFilterRequest
      description: 添加全局滤镜请求
      example:
        filter_type: FilterType.XXX
        intensity: 100.0
        target_timerange:
          duration: 5000000
          start: 0
    AddFilterResponse:
      properties: {}
      type: object
      title: AddFilterResponse
      description: 添加全局滤镜响应
    AddImagesRequest:
      properties:
        image_infos:
          type: string
          title: Image Infos
          description: 图片信息列表，JSON字符串
        alpha:
          type: number
          title: Alpha
          description: 全局透明度[0, 1]
          default: 1.0
        scale_x:
          type: number
          title: Scale X
          description: X轴缩放比例
          default: 1.0
        scale_y:
          type: number
          title: Scale Y
          description: Y轴缩放比例
          default: 1.0
        transform_x:
          type: integer
          title: Transform X
          description: X轴位置偏移(像素)
          default: 0
        transform_y:
          type: integer
          title: Transform Y
          description: Y轴位置偏移(像素)
          default: 0
      type: object
      required:
      - image_infos
      title: AddImagesRequest
      description: 批量添加图片请求参数。
    AddImagesResponse:
      properties:
        segment_ids:
          items:
            type: string
