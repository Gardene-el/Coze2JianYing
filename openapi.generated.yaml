servers:
- url: https://coze2jianying.pages.dev
components:
  schemas:
    TimeRange:
      properties:
        start:
          type: integer
          minimum: 0.0
          description: 开始时间（微秒）
        duration:
          type: integer
          minimum: 0.0
          exclusiveMinimum: true
          description: 持续时长（微秒）
      type: object
      required:
      - start
      - duration
      description: 时间范围模型（微秒）
    ClipSettings:
      properties:
        alpha:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 透明度 (0.0-1.0)
          default: 1.0
        rotation:
          type: number
          description: 旋转角度（度）
          default: 0.0
        scale_x:
          type: number
          minimum: 0.0
          exclusiveMinimum: true
          description: X 轴缩放比例
          default: 1.0
        scale_y:
          type: number
          minimum: 0.0
          exclusiveMinimum: true
          description: Y 轴缩放比例
          default: 1.0
        transform_x:
          type: number
          description: X 轴位置偏移
          default: 0.0
        transform_y:
          type: number
          description: Y 轴位置偏移
          default: 0.0
      type: object
      description: '图像调节设置（镜像 pyJianYingDraft.ClipSettings）

        对应 pyJianYingDraft 的 ClipSettings 类，用于控制片段的变换属性'
    TextStyle:
      properties:
        font_size:
          type: number
          minimum: 0.0
          exclusiveMinimum: true
          description: 字体大小（与剤映中定义一致）
          default: 8.0
        color:
          items:
            type: number
          type: array
          description: 文字颜色 RGB (0.0-1.0)
          default:
          - 1.0
          - 1.0
          - 1.0
        alpha:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 文字不透明度 0.0-1.0
          default: 1.0
        bold:
          type: boolean
          description: 是否加粗
          default: false
        italic:
          type: boolean
          description: 是否斜体
          default: false
        underline:
          type: boolean
          description: 是否下划线
          default: false
        align:
          type: integer
          maximum: 2.0
          minimum: 0.0
          description: '对齐方式: 0=左对齐, 1=居中, 2=右对齐'
          default: 0
        vertical:
          type: boolean
          description: 是否竖排文本
          default: false
        letter_spacing:
          type: integer
          description: 字符间距（与剤映中定义一致）
          default: 0
        line_spacing:
          type: integer
          description: 行间距（与剤映中定义一致）
          default: 0
        auto_wrapping:
          type: boolean
          description: 是否自动换行（开启后 type 为 subtitle）
          default: false
        max_line_width:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 每行最大宽度（占屏幕宽度比例 0-1）
          default: 0.82
      type: object
      description: '文本样式（镜像 pyJianYingDraft.TextStyle）

        对应 pyJianYingDraft 的 TextStyle 类，用于控制文本的样式属性'
    TextBorder:
      properties:
        color:
          items:
            type: number
          type: array
          description: 描边颜色 RGB (0.0-1.0)
          default:
          - 0.0
          - 0.0
          - 0.0
        alpha:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 描边不透明度 0.0-1.0
          default: 1.0
        width:
          type: number
          maximum: 100.0
          minimum: 0.0
          description: 描边宽度 0-100（与剤映中定义一致）
          default: 40.0
      type: object
      description: 文本描边参数（镜像 pyJianYingDraft.TextBorder）
    TextShadow:
      properties:
        color:
          items:
            type: number
          type: array
          description: 阴影颜色 RGB (0.0-1.0)
          default:
          - 0.0
          - 0.0
          - 0.0
        alpha:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 阴影不透明度 0.0-1.0
          default: 0.9
        diffuse:
          type: number
          maximum: 100.0
          minimum: 0.0
          description: 阴影扩散程度 0-100
          default: 15.0
        distance:
          type: number
          maximum: 100.0
          minimum: 0.0
          description: 阴影距离 0-100
          default: 5.0
        angle:
          type: number
          maximum: 180.0
          minimum: -180.0
          description: 阴影角度 -180 到 180
          default: -45.0
      type: object
      description: 文本阴影参数（镜像 pyJianYingDraft.TextShadow）
    TextBackground:
      properties:
        color:
          type: string
          description: 背景颜色，格式为 '#RRGGBB'
        style:
          type: integer
          maximum: 2.0
          minimum: 1.0
          description: 背景样式 1 或 2
          default: 1
        alpha:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 背景不透明度 0.0-1.0
          default: 1.0
        round_radius:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 圆角半径 0-1
          default: 0.0
        height:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 背景高度 0-1
          default: 0.14
        width:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 背景宽度 0-1
          default: 0.14
        horizontal_offset:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 水平偏移 0-1
          default: 0.5
        vertical_offset:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: 竖直偏移 0-1
          default: 0.5
      type: object
      required:
      - color
