              schema:
                $ref: '#/components/schemas/AddTrackResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_effect:
    post:
      tags:
      - basic
      summary: 添加全局特效
      description: 在草稿上添加一个覆盖指定时间范围的全局特效。
      operationId: add_effect_drafts__draft_id__add_effect_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
