        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddImagesRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddImagesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_effects:
    post:
      tags:
      - easy
      summary: 批量添加特效
      description: 解析特效信息 JSON，批量创建特效片段并添加到草稿，返回片段 ID 列表。
      operationId: add_effects_drafts__draft_id__add_effects_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEffectsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddEffectsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_masks:
    post:
      tags:
      - easy
      summary: 批量添加遮罩
      description: 为指定的多个片段批量应用遇罩效果，支持形状、缩放、缩放、旋转和羽化设置。
      operationId: add_masks_drafts__draft_id__add_masks_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMasksRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddMasksResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_keyframes:
    post:
      tags:
      - easy
      summary: 批量添加关键帧
      description: 解析关键帧信息 JSON，批量为多个片段添加动画关键帧。
      operationId: add_keyframes_drafts__draft_id__add_keyframes_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddKeyframesRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddKeyframesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/create_draft:
    post:
      tags:
      - basic
      summary: 创建草稿
      description: 创建一个新的剪映草稿，返回草稿 ID，后续所有操作均通过此 ID 引用该草稿。
      operationId: create_draft_drafts_create_draft_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDraftResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/save_draft:
    post:
      tags:
      - basic
      summary: 保存草稿
      description: 将当前草稿内容持久化写入磁盘，使剪映可以读取到最新编辑结果。
      operationId: save_draft_drafts__draft_id__save_draft_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveDraftResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /drafts/{draft_id}/add_segment:
    post:
      tags:
      - basic
      summary: 添加片段到草稿
      description: 将已创建的片段（音频/视频/文本/贴纸）添加到指定草稿的对应轨道中。
      operationId: add_segment_drafts__draft_id__add_segment_post
      parameters:
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
          description: 草稿的唯一标识 ID
          title: Draft Id
        description: 草稿的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSegmentRequest'
      responses:
        '200':
          description: Successful Response
