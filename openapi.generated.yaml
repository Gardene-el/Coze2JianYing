  /segments/{segment_id}/add_audio_effect:
    post:
      tags:
      - basic
      summary: 为音频片段添加音效
      description: 为指定音频片段添加音场、变调或语音转歌曲等音效。
      operationId: add_audio_effect_segments__segment_id__add_audio_effect_post
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
          title: Segment Id
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAudioEffectRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddAudioEffectResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /segments/{segment_id}/add_audio_fade:
    post:
      tags:
      - basic
      summary: 为音频片段添加淡入淡出
      description: 为指定音频片段设置淡入和淡出的时长。
      operationId: add_audio_fade_segments__segment_id__add_audio_fade_post
      parameters:
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          description: 片段的唯一标识 ID
          title: Segment Id
        description: 片段的唯一标识 ID
      requestBody:
        required: true
        content:
